openapi: 3.1.0
info:
  title: Agricultural federation API
  description: |
    # Versioning
    This API uses semantic versioning (MAJOR.MINOR.PATCH).
    Available versions are :
    - v0.0.1 (2026-04-21) : POST /collectivities for collectivities creation and POST /members for members creation.
    - v0.1.0 (2026-04-22) : PATCH /collectivities/{id}/identification for collectivity identification attribution.
  version: 0.1.0
servers:
  - url: 'https://localhost:8080'
paths:
  '/collectivities':
    post:
      summary: Create list of collectivities
      description: |
        During collectivity request body creation, only members ID are provided to identify members.
        But the response content includes members information, not only their IDs.
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateCollectivity'
      responses:
        '201':
          description: List of created collectivities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivity'
        '400':
          description: Collectivity without federation approval or structure missing.
        '404':
          description: Member not found.

  '/collectivities/{id}/identification':
    patch:
      summary: Assign identification number and name to a collectivity
      description: |
        Assigns a unique identification number and name to an existing collectivity.
        The federation provides the name, and the system validates its uniqueness.
        The system generates a unique identification number automatically.
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the collectivity to identify
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectivityIdentificationRequest'
      responses:
        '200':
          description: Collectivity identification successfully assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivity'
          headers:
            Location:
              description: URL of the identified collectivity
              schema:
                type: string
        '400':
          description: |
            Bad request when:
            - The provided name already exists for another collectivity
            - The collectivity already has an identification number
            - Invalid name format
        '404':
          description: Collectivity not found
        '409':
          description: Collectivity name already exists (conflict)

  '/members':
    post:
      summary: Create list of members
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateMember'
      responses:
        '201':
          description: List of created members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
        '400':
          description: |
            The following case must return a bad request exception :
            - Member with bad referees or without proper payment.
            - Membership dues not paid or registration fee not paid.
        '404':
          description: Either collectivity or member not found.

components:
  schemas:
    CreateCollectivity:
      type: object
      properties:
        location:
          type: string
        members:
          type: array
          items:
            schema:
              $ref: '#/components/schemas/MemberIdentifier'
        federationApproval:
          type: boolean
        structure:
          $ref: '#/components/schemas/CreateCollectivityStructure'

    CreateCollectivityStructure:
      type: object
      properties:
        president:
          $ref: '#/components/schemas/MemberIdentifier'
        vicePresident:
          $ref: '#/components/schemas/MemberIdentifier'
        treasurer:
          $ref: '#/components/schemas/MemberIdentifier'
        secretary:
          $ref: '#/components/schemas/MemberIdentifier'

    CollectivityStructure:
      type: object
      properties:
        president:
          $ref: '#/components/schemas/Member'
        vicePresident:
          $ref: '#/components/schemas/Member'
        treasurer:
          $ref: '#/components/schemas/Member'
        secretary:
          $ref: '#/components/schemas/Member'

    Collectivity:
      type: object
      properties:
        id:
          type: string
        identificationNumber:
          type: string
          description: Unique identification number assigned by the system
          pattern: '^FED-COL-\d{6}$'
          example: 'FED-COL-000123'
        name:
          type: string
          description: Unique name assigned by the federation
          minLength: 3
          maxLength: 100
          example: 'Farmers Cooperative of Normandy'
        location:
          type: string
        structure:
          $ref: '#/components/schemas/CollectivityStructure'
        members:
          type: array
          items:
            $ref: '#/components/schemas/Member'

    CollectivityIdentificationRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name to assign to the collectivity (must be unique)
          minLength: 3
          maxLength: 100
          example: 'Farmers Cooperative of Normandy'

    MemberIdentifier:
      type: string

    CreateMember:
      type: object
      allOf:
        - $ref: '#/components/schemas/MemberInformation'
      properties:
        collectivityIdentifier:
          type: string
        referees:
          type: array
          items:
            $ref: '#/components/schemas/MemberIdentifier'
        registrationFeePaid:
          type: boolean
        membershipDuesPaid:
          type: boolean

    MemberInformation:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        address:
          type: string
        profession:
          type: string
        phoneNumber:
          type: integer
        email:
          type: string
        occupation:
          $ref: '#/components/schemas/MemberOccupation'

    Member:
      type: object
      allOf:
        - $ref: '#/components/schemas/MemberInformation'
      properties:
        id:
          $ref: '#/components/schemas/MemberIdentifier'
        referees:
          type: array
          items:
            $ref: '#/components/schemas/Member'

    Gender:
      type: string
      enum:
        - MALE
        - FEMALE

    MemberOccupation:
      type: string
      enum:
        - JUNIOR
        - SENIOR
        - SECRETARY
        - TREASURER
        - VICE_PRESIDENT
        - PRESIDENT